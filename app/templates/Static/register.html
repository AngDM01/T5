<div class="form-div">
  <form id="RegisterForm" onsubmit="sendRegister(event)">
    <section>
      <h2>Registrarse</h2>
      
      <fieldset>
        <div>
          <label for="name">Nombre completo</label>
          <input type="text" id="name" name="name" 
              required 
              maxlength="100" 
              autofocus>
        </div>

        <div>
          <label for="age">Edad</label>
          <input type="number" id="age" name="age"
              required 
              min="18"
              max="127">
        </div>

        <div>
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="example@example.com" 
              required 
              maxlength="255">
        </div>

        <div>
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" 
              required 
              maxlength="255">
        </div>

        <div>
          <label for="passwordConf">Confirmar contraseña</label>
          <input type="password" id="passwordConf" name="passwordConf" 
              required 
              maxlength="255">
        </div>
      </fieldset>
    </section>

    <div style="width: 100%;">
      <a href="#" onclick="gotToLogin()" class="menu-item">Ir a Iniciar sesión</a>
    </div>

    <fieldset class="bttn-grp">
      <button class="custom-bttn" type="submit">Registrarse</button>
      <button class="custom-bttn" type="button" onclick="goToMainPage()">Cancelar</button>
    </fieldset>
  </form>
</div>
